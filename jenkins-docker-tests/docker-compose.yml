services:
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    container_name: jenkins
    dns:
      - 8.8.8.8
      - 1.1.1.1

  pytest-runner:
    image: python:3.10
    volumes:
      - ./:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && pytest"
    container_name: pytest-runner

volumes:
  jenkins_home:
    

